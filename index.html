<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Push /start</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f14;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        isolation: isolate;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.16), transparent 38%),
          linear-gradient(180deg, #16161d 0%, #09090d 100%);
      }

      .card {
        position: relative;
        width: min(100%, 390px);
        aspect-ratio: 9 / 16;
        border-radius: 34px;
        overflow: hidden;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.45),
          0 8px 30px rgba(0, 0, 0, 0.25);
        background: #111;
      }

      .photo {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to bottom, rgba(5, 5, 8, 0.12), rgba(5, 5, 8, 0.36)),
          url('imagen1');
        background-size: cover;
        background-position: center center;
        transform: scale(1.02);
      }

      .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to top, rgba(10, 10, 14, 0.5) 0%, rgba(10, 10, 14, 0.08) 42%, rgba(10, 10, 14, 0.18) 100%),
          radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.12) 100%);
      }

      .content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .cta {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 250px;
        max-width: 88%;
        min-height: 62px;
        padding: 16px 26px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(12, 12, 18, 0.38);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        color: #ffffff;
        text-decoration: none;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.01em;
        box-shadow:
          0 14px 35px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255,255,255,0.22);
        transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      }

      .cta:hover {
        background: rgba(18, 18, 26, 0.5);
        box-shadow:
          0 18px 45px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255,255,255,0.24);
      }

      .cta:active {
        transform: scale(0.985);
      }

      .emoji {
        font-size: 20px;
        line-height: 1;
      }

      @media (max-width: 420px) {
        .page {
          padding: 12px;
        }

        .card {
          width: 100%;
          border-radius: 28px;
        }

        .cta {
          min-width: unset;
          width: 100%;
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="photo"></div>
        <div class="content">
          <a href="#" class="cta">push /start to get a gift <span class="emoji">😈</span></a>
        </div>
      </section>
    </main>
  </body>
</html>
