      .overlay {
        width: min(100%, 430px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }
      .pill {
        padding: 10px 16px;
        border-radius: 999px;
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.24);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(28px, 8vw, 42px);
        line-height: 0.95;
        text-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      p {
        margin: 0;
        text-align: center;
        max-width: 280px;
        font-size: 15px;
        line-height: 1.5;
        color: rgba(255,255,255,0.9);
        text-shadow: 0 8px 24px rgba(0,0,0,0.28);
      }
      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: min(100%, 290px);
        min-height: 62px;
        padding: 16px 24px;
        border: none;
        border-radius: 999px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: #ffffff;
        text-decoration: none;
        background: linear-gradient(135deg, rgba(18,18,24,0.92), rgba(64,11,11,0.88));
        box-shadow: 0 18px 45px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.18);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .cta:active {
        transform: scale(0.98);
      }
      .emoji {
        font-size: 22px;
        line-height: 1;
      }
      .links {
        width: 100%;
        display: grid;
        gap: 12px;
        margin-top: 6px;
      }
      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 14px 18px;
        text-decoration: none;
        color: white;
        border-radius: 18px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.16);
        backdrop-filter: blur(10px);
        font-weight: 600;
      }
      .bottom-fade {
        position: absolute;
        inset: auto 0 0 0;
        height: 26vh;
        background: linear-gradient(to top, rgba(8,8,12,0.34), transparent);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="overlay">
        <div class="pill">Exclusive Access</div>
        <h1>Tap In.<br />Claim Your Gift.</h1>
        <p>A simple mobile-first landing page with a Linktree vibe and one clear action.</p>

        <a href="#" class="cta">
          <span>Push Start to Get a Gift</span>
          <span class="emoji">😈</span>
        </a>

        <div class="links">
          <a class="link" href="#">Latest Drop</a>
          <a class="link" href="#">VIP Access</a>
          <a class="link" href="#">Special Offer</a>
        </div>
      </div>
      <div class="bottom-fade"></div>
    </main>
  </body>
