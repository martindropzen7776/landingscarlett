<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #0f0c08; font-family: "DM Sans", sans-serif; color: #f5efe6; }
.page { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
.bg-photo { position: absolute; inset: 0; z-index: 0; }
.bg-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center 8%; animation: fadeIn 1s ease forwards; }
.bg-photo::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(15,12,8,0) 0%, rgba(15,12,8,0) 30%, rgba(15,12,8,0.6) 52%, rgba(15,12,8,0.93) 65%, rgba(15,12,8,0.97) 75%, rgba(15,12,8,0.99) 100%); }
.badge { position: relative; z-index: 2; display: flex; align-items: center; gap: 0.55rem; margin-top: 1.6rem; animation: fadeUp 0.6s ease 0.3s both; }
.badge-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #c9933a; overflow: hidden; }
.badge-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.badge-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; color: #c9933a; }
.dot { display: inline-block; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
.spacer { flex: 1; }
.hotzone { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; padding: 0 1.6rem calc(2.4rem + env(safe-area-inset-bottom, 0px)); }
h1 { font-family: "Cormorant Garamond", serif; font-size: clamp(2.6rem, 8vw, 3.6rem); font-weight: 300; line-height: 1.06; color: #f5efe6; margin-bottom: 0.2rem; animation: fadeUp 0.7s ease 0.5s both; }
h1 em { font-style: italic; color: #d4a574; }
.sub { font-family: "Cormorant Garamond", serif; font-size: clamp(1.2rem, 4.5vw, 1.6rem); font-style: italic; color: rgba(245,239,230,0.55); margin-bottom: 1.6rem; animation: fadeUp 0.7s ease 0.62s both; }
.cta { display: flex; align-items: center; justify-content: center; gap: 0.7rem; width: 100%; max-width: 340px; background: #24a1de; color: #fff; text-decoration: none; font-size: 1.05rem; font-weight: 500; padding: 1rem 1.8rem; border-radius: 50px; box-shadow: 0 8px 32px rgba(36,161,222,0.45); transition: transform 0.2s; animation: fadeUp 0.7s ease 0.74s both; margin-bottom: 1rem; -webkit-tap-highlight-color: transparent; }
.cta:active { transform: scale(0.97); }
.cta svg { width: 20px; height: 20px; flex-shrink: 0; }
.hint-box { display: flex; align-items: center; gap: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.65rem 1rem; width: 100%; max-width: 340px; animation: fadeUp 0.7s ease 0.86s both; }
.hint-icon { font-size: 1.3rem; flex-shrink: 0; }
.hint-text { font-size: 0.78rem; line-height: 1.45; color: rgba(245,239,230,0.5); text-align: left; }
.hint-text strong { color: rgba(245,239,230,0.8); font-weight: 500; }
@media (min-width: 641px) {
  .bg-photo::after { background: linear-gradient(to right, rgba(15,12,8,0.05) 0%, rgba(15,12,8,0.6) 50%, rgba(15,12,8,0.97) 100%), linear-gradient(to top, rgba(15,12,8,0.4) 0%, transparent 35%); }
  .badge { margin-top: 2rem; }
  .hotzone { align-items: flex-end; text-align: right; padding: 0 4rem 3rem; max-width: 540px; margin-left: auto; }
  .cta { max-width: 320px; }
  .hint-box { max-width: 320px; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
</style>
